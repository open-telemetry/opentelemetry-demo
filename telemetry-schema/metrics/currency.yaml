file_format: definition/2
metrics:
  - name: demo.exchange.conversions
    brief: Currency conversion counter
    instrument: counter
    unit: "{conversion}"
    stability: stable
    annotations:
      service: currency
    attributes:
      - ref: demo.exchange.from
        requirement_level: required
      - ref: demo.exchange.to
        requirement_level: required
