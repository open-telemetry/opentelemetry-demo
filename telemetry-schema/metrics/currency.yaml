file_format: definition/2
attributes:
  - key: currency_code
    type: string
    brief: Currency code
    stability: stable
    examples: ["USD", "EUR", "GBP"]
    note: The currency code involved in the conversion operation

metrics:
  - name: app.currency
    brief: Currency conversion counter
    instrument: counter
    unit: "{conversion}"
    stability: stable
    annotations:
      service: currency
    attributes:
      - ref: currency_code
        requirement_level: required
