file_format: definition/2
metrics:
  - name: demo.product.review.requests
    brief: Product review counter
    instrument: counter
    unit: "{review_request}"
    stability: stable
    annotations:
      service: product_reviews
    attributes:
      - ref: demo.product.id
        requirement_level: required
        note: The unique identifier of the product for which reviews are being retrieved

  - name: demo.product.ai_assistant.requests
    brief: AI assistant request counter
    instrument: counter
    unit: "{ai_request}"
    stability: stable
    annotations:
      service: product_reviews
    attributes:
      - ref: demo.product.id
        requirement_level: required
        note: The unique identifier of the product for which AI assistance is being requested
