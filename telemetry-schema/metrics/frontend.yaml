file_format: definition/2
attributes:
  - key: method
    type: string
    brief: HTTP method
    stability: stable
    examples: ["GET", "POST"]
  - key: target
    type: string
    brief: Request target/path
    stability: stable
    examples: ["/", "/cart", "/checkout"]
  - key: status
    type: int
    brief: HTTP status code
    stability: stable
    examples: [200, 404, 500]

metrics:
  - name: app.frontend.requests
    brief: Frontend HTTP request counter
    instrument: counter
    unit: "{request}"
    stability: stable
    annotations:
      service: frontend
    attributes:
      - ref: method
        requirement_level: required
      - ref: target
        requirement_level: required
      - ref: status
        requirement_level: required
