    multi-ecosystem-group: "src-product-reviews"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directories:
      - "/src/product-reviews"
      - "/src/product-reviews/genproto"
    patterns:
      - "*"
    multi-ecosystem-group: "src-product-reviews"
  - package-ecosystem: "composer"
    cooldown:
      default-days: 3
    directory: "/src/quote"
    patterns:
      - "*"
    multi-ecosystem-group: "src-quote"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/quote"
    patterns:
      - "*"
    multi-ecosystem-group: "src-quote"
  - package-ecosystem: "pip"
    cooldown:
      default-days: 3
    directories:
      - "/src/recommendation"
      - "/src/recommendation/genproto"
    patterns:
      - "*"
    multi-ecosystem-group: "src-recommendation"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directories:
      - "/src/recommendation"
      - "/src/recommendation/genproto"
    patterns:
      - "*"
    multi-ecosystem-group: "src-recommendation"
  - package-ecosystem: "npm"
    cooldown:
      default-days: 3
    directory: "/src/react-native-app"
    patterns:
      - "*"
    multi-ecosystem-group: "src-react-native-app"
  - package-ecosystem: "bundler"
    cooldown:
