version: 2
multi-ecosystem-groups:
  src-accounting:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-ad:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-cart:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-checkout:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-email:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-flagd-ui:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-fraud-detection:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-frontend:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-llm:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-load-generator:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-payment:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-product-catalog:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-product-reviews:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-quote:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-recommendation:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-react-native-app:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-shipping:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  src-telemetry-docs:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
updates:
  - package-ecosystem: "github-actions"
    cooldown:
      default-days: 3
    directories:
      - "/"
    groups:
      actions-production-dependencies:
        dependency-type: "production"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:00"
  - package-ecosystem: "gomod"
    cooldown:
      default-days: 3
    directories:
      - "/internal/tools"
    groups:
      go-production-dependencies:
        dependency-type: "production"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:05"
  - package-ecosystem: "npm"
    cooldown:
      default-days: 3
    directory: "/"
    groups:
      npm-production-dependencies:
        dependency-type: "production"
      npm-development-dependencies:
        dependency-type: "development"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:30"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/test/tracetesting"
    groups:
      test-docker-base-images:
        patterns:
          - "*"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  - package-ecosystem: "nuget"
    cooldown:
      default-days: 3
    directory: "/src/accounting"
    patterns:
      - "*"
    multi-ecosystem-group: "src-accounting"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/accounting"
    patterns:
      - "*"
    multi-ecosystem-group: "src-accounting"
  - package-ecosystem: "gradle"
    cooldown:
      default-days: 3
    directory: "/src/ad"
    patterns:
      - "*"
    multi-ecosystem-group: "src-ad"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/ad"
    patterns:
      - "*"
    multi-ecosystem-group: "src-ad"
  - package-ecosystem: "nuget"
    cooldown:
      default-days: 3
    directories:
      - "/src/cart/src"
      - "/src/cart/tests"
    patterns:
      - "*"
    multi-ecosystem-group: "src-cart"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/cart/src"
    patterns:
      - "*"
    multi-ecosystem-group: "src-cart"
  - package-ecosystem: "gomod"
    cooldown:
      default-days: 3
    directory: "/src/checkout"
    patterns:
      - "*"
    multi-ecosystem-group: "src-checkout"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directories:
      - "/src/checkout"
      - "/src/checkout/genproto"
    patterns:
      - "*"
    multi-ecosystem-group: "src-checkout"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directories:
      - "/src/currency"
      - "/src/currency/genproto"
    groups:
      src-currency:
        patterns:
          - "*"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  - package-ecosystem: "bundler"
    cooldown:
      default-days: 3
    directory: "/src/email"
    patterns:
      - "*"
    multi-ecosystem-group: "src-email"
    allow:
      - dependency-type: "all"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/email"
    patterns:
      - "*"
    multi-ecosystem-group: "src-email"
  - package-ecosystem: "mix"
    cooldown:
      default-days: 3
    directory: "/src/flagd-ui"
    patterns:
      - "*"
    multi-ecosystem-group: "src-flagd-ui"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/flagd-ui"
    patterns:
      - "*"
    multi-ecosystem-group: "src-flagd-ui"
  - package-ecosystem: "gradle"
    cooldown:
      default-days: 3
    directory: "/src/fraud-detection"
    patterns:
      - "*"
    multi-ecosystem-group: "src-fraud-detection"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/fraud-detection"
    patterns:
      - "*"
    multi-ecosystem-group: "src-fraud-detection"
  - package-ecosystem: "npm"
    cooldown:
      default-days: 3
    directory: "/src/frontend"
    patterns:
      - "*"
    multi-ecosystem-group: "src-frontend"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directories:
      - "/src/frontend"
      - "/src/frontend/genproto"
    patterns:
      - "*"
    multi-ecosystem-group: "src-frontend"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/frontend-proxy"
    groups:
      src-frontend-proxy:
        patterns:
          - "*"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/image-provider"
    groups:
      src-image-provider:
        patterns:
          - "*"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/kafka"
    groups:
      src-kafka:
        patterns:
          - "*"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  - package-ecosystem: "pip"
    cooldown:
      default-days: 3
    directory: "/src/llm"
    patterns:
      - "*"
    multi-ecosystem-group: "src-llm"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/llm"
    patterns:
      - "*"
    multi-ecosystem-group: "src-llm"
  - package-ecosystem: "pip"
    cooldown:
      default-days: 3
    directory: "/src/load-generator"
    patterns:
      - "*"
    multi-ecosystem-group: "src-load-generator"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/load-generator"
    patterns:
      - "*"
    multi-ecosystem-group: "src-load-generator"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/opensearch"
    groups:
      src-opensearch:
        patterns:
          - "*"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  - package-ecosystem: "npm"
    cooldown:
      default-days: 3
    directory: "/src/payment"
    patterns:
      - "*"
    multi-ecosystem-group: "src-payment"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/src/payment"
    patterns:
      - "*"
    multi-ecosystem-group: "src-payment"
  - package-ecosystem: "gomod"
    cooldown:
      default-days: 3
    directory: "/src/product-catalog"
    patterns:
      - "*"
    multi-ecosystem-group: "src-product-catalog"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directories:
