updates:
  - package-ecosystem: "github-actions"
    cooldown:
      default-days: 3
    directories:
      - "/"
    groups:
      actions-production-dependencies:
        dependency-type: "production"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:00"
  - package-ecosystem: "gomod"
    cooldown:
      default-days: 3
    directories:
      - "/internal/tools"
    groups:
      go-production-dependencies:
        dependency-type: "production"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:05"
  - package-ecosystem: "npm"
    cooldown:
      default-days: 3
    directory: "/"
    groups:
      npm-production-dependencies:
        dependency-type: "production"
      npm-development-dependencies:
        dependency-type: "development"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:30"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 3
    directory: "/test/tracetesting"
    groups:
      test-docker-base-images:
        patterns:
          - "*"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:50"
  - package-ecosystem: "nuget"  # zizmor: ignore[dependabot-cooldown] cooldown prevents multi-ecosystem batching
    directories:
      - "/src/accounting/**"
    patterns:
      - "*"
    multi-ecosystem-group: "src-accounting"
