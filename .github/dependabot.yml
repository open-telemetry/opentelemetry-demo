version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/"
    groups:
      actions-production-dependencies:
        dependency-type: "production"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:00"
  - package-ecosystem: "gomod"
    directories:
      - "/src/**/*"
      - "/internal/tools/**/*"
    groups:
      go-production-dependencies:
        dependency-type: "production"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:05"
  - package-ecosystem: "gradle"
    directories:
      - "/src/**/*"
    exclude-paths:
      - "src/react-native-app/**"
    groups:
      gradle-production-dependencies:
        dependency-type: "production"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:10"
  - package-ecosystem: "pip"
    directories:
      - "/src/**/*"
    groups:
      pip-production-dependencies:
        dependency-type: "production"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:15"
  - package-ecosystem: "nuget"
    directories:
      - "/src/**/*"
    groups:
      nuget-production-dependencies:
        dependency-type: "production"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:20"
  - package-ecosystem: "composer"
    directories:
      - "/src/**/*"
    groups:
      composer-production-dependencies:
        dependency-type: "production"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:25"
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/src/frontend/*"
      - "/src/payment/*"
    groups:
      npm-production-dependencies:
        dependency-type: "production"
      npm-development-dependencies:
        dependency-type: "development"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:30"
  - package-ecosystem: "cargo"
    directories:
      - "/src/shipping/*"
    groups:
      cargo-production-dependencies:
        dependency-type: "production"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:35"
    allow:
      - dependency-type: "all"
  - package-ecosystem: "bundler"
    directories:
      - "/src/email/*"
    groups:
      bundler-production-dependencies:
        dependency-type: "production"
      bundler-development-dependencies:
        dependency-type: "development"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:40"
    allow:
      - dependency-type: "all"
  - package-ecosystem: "mix"
    directories:
      - "/src/flagd-ui/*"
    groups:
      mix-production-dependencies:
        dependency-type: "production"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:45"
