name: Telemetry Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/telemetry/**'
      - 'docker-compose.yml'
      - 'docker-compose-telemetry-tests.yml'
      - '.env'
      - '.github/workflows/run-telemetry-tests.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/telemetry/**'
      - 'docker-compose.yml'
      - 'docker-compose-telemetry-tests.yml'
      - '.env'
      - '.github/workflows/run-telemetry-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  telemetry-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    name: "Telemetry Sanity Tests"
    steps:
      - name: check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune -af

      - name: Build demo images
        run: make build

      - name: Start demo
        run: make start

      - name: Run telemetry tests
        run: make run-telemetry-tests

      - name: Print service logs on failure
        if: failure()
        run: docker compose logs --tail=50

      - name: Stop demo
        if: always()
        run: make stop
