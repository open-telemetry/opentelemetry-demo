# Pulls changes from the sureops template fork into THIS customer fork weekly.
#
# Runs in EACH customer fork (deployed there by coord at provision time).
# The schedule triggers a merge of the template's main into this fork's main.
#
# CRITICAL — chaos invisibility contract:
#   Before pushing the merge, this workflow REMOVES `.sureops-internal/`
#   from the staged changes. That directory contains the demo failure-mode
#   answer key and MUST NEVER appear in customer forks (sureops's diagnosis
#   agents read customer forks via github-mcp; if they could see the answer
#   key, the demo would break — see docs/backend/22-sample-stack-otel-demo-spec.md
#   section 4.4.1 in the sureops repo).
#
# Auto-merge policy:
#   - Files under .sureops/, .github/workflows/ → auto-merge if CI passes
#     (sureops-owned, customer doesn't need to review)
#   - Files under chart/ → auto-PR-and-wait (deploy risk; customer reviews)
#   - Files under src/ → auto-PR-and-wait (customer's code; they decide)

name: customer-sync (template → customer fork)

on:
  schedule:
    - cron: '0 14 * * 1'  # every Monday at 2pm UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "sureops-bot"
          git config user.email "bot@sureops.ai"

      - name: Add template remote
        run: |
          git remote add template https://github.com/sureops-private-beta/sample-app-otel-demo
          git fetch template main

      - name: Compute merge into a sync branch
        id: merge
        run: |
          BRANCH="sync/template-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"

          # Merge template's main into this branch. --no-commit so we can
          # remove .sureops-internal/ before committing.
          if git merge template/main --no-commit --no-ff --allow-unrelated-histories; then
            echo "merge_status=clean" >> $GITHUB_OUTPUT
          else
            echo "merge_status=conflicts" >> $GITHUB_OUTPUT
          fi

          # CHAOS INVISIBILITY: strip .sureops-internal/ from the merge.
          # This is the load-bearing line — DO NOT REMOVE without reading
          # docs/backend/22-sample-stack-otel-demo-spec.md section 4.4.1.
          git rm -rf --cached --ignore-unmatch .sureops-internal/ 2>/dev/null || true
          rm -rf .sureops-internal/ 2>/dev/null || true

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Commit + push
        if: steps.merge.outputs.merge_status == 'clean'
        run: |
          # Check if there are any changes to commit
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes from template; nothing to sync."
            exit 0
          fi
          git add -A
          git commit -m "chore(sync): pull from sureops template (excluding sureops-internal)" \
            --author "sureops-bot <bot@sureops.ai>"
          git push origin "${{ steps.merge.outputs.branch }}"

      - name: Open PR
        if: steps.merge.outputs.merge_status == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if there's actually anything to PR
          if ! git rev-parse --verify "origin/${{ steps.merge.outputs.branch }}" >/dev/null 2>&1; then
            echo "No branch pushed; nothing to PR."
            exit 0
          fi

          # Determine if this PR contains chart/ changes (customer should review)
          # vs only sureops-owned changes (.sureops/, .github/workflows/) which
          # can be auto-merged.
          CHART_CHANGED=$(git diff --name-only main..${{ steps.merge.outputs.branch }} | grep -E '^chart/' | wc -l)
          SRC_CHANGED=$(git diff --name-only main..${{ steps.merge.outputs.branch }} | grep -E '^src/' | wc -l)

          if [ "$CHART_CHANGED" -gt 0 ] || [ "$SRC_CHANGED" -gt 0 ]; then
            LABEL="needs-review"
            BODY="This sync PR includes changes to chart/ or src/. Please review before merging."
          else
            LABEL="auto-merge"
            BODY="This sync PR only touches sureops-owned files (.sureops/ or .github/workflows/). Will auto-merge after CI passes."
          fi

          gh pr create \
            --title "chore(sync): pull from sureops template — $(date +%Y-%m-%d)" \
            --body "$BODY

This PR pulls the latest changes from the sureops template fork
(\`sureops-private-beta/sample-app-otel-demo\`).

Generated by \`.github/workflows/customer-sync.yml\`. The \`.sureops-internal/\`
directory is intentionally excluded.

If you have questions, reach out to sureops support." \
            --label "$LABEL" \
            --base main \
            --head "${{ steps.merge.outputs.branch }}"

      - name: Auto-merge sureops-owned-only sync
        if: steps.merge.outputs.merge_status == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If the PR only touches sureops-owned files, enable auto-merge
          PR_NUMBER=$(gh pr list --head "${{ steps.merge.outputs.branch }}" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR opened (probably nothing to sync)."
            exit 0
          fi

          if gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' | grep -q "auto-merge"; then
            gh pr merge "$PR_NUMBER" --auto --squash
            echo "Auto-merge enabled on PR #$PR_NUMBER"
          else
            echo "PR #$PR_NUMBER requires customer review (chart/ or src/ changes); not auto-merging"
          fi

      - name: Notify on conflicts
        if: steps.merge.outputs.merge_status == 'conflicts'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Open an issue describing the conflict; manual resolution needed
          gh issue create \
            --title "Sync from sureops template has conflicts ($(date +%Y-%m-%d))" \
            --body "The weekly sync from the sureops template fork hit merge conflicts.

Resolve manually:

\`\`\`
git fetch origin
git checkout -b resolve/template-sync
git merge template/main
# resolve conflicts
git rm -rf --ignore-unmatch .sureops-internal/   # IMPORTANT
git commit
git push -u origin resolve/template-sync
gh pr create --title 'resolve template sync' --base main --head resolve/template-sync
\`\`\`

If unsure how to resolve, contact sureops support." \
            --label "sync-conflict"
