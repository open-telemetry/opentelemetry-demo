services:
  otel-ebpf-profiler:
    image: otel/opentelemetry-collector-ebpf-profiler:0.147.0
    container_name: otel-ebpf-profiler
    command:
      - --config=/etc/ebpf-profiler-config.yaml
      - --feature-gates=service.profilesSupport
    privileged: true
    pid: "host"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./src/otel-collector/otelcol-ebpf-profiling.yml:/etc/ebpf-profiler-config.yaml:ro
      - /sys/kernel/debug:/sys/kernel/debug
      - /sys/kernel/tracing:/sys/kernel/tracing
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /proc:/proc:ro
    depends_on:
      - firepit
  firepit:
    image: ghcr.io/florianl/firepit:latest
    build:
      context: https://github.com/florianl/firepit.git
    container_name: firepit
    ports:
      - "${FIREPIT_PORT:-4040}:8080"
