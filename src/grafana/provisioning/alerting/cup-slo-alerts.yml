            model:
              expr: >-
                sum(rate(rpc_server_duration_count{rpc_service="oteldemo.ProductReviewService",rpc_grpc_status_code="0"}[5m]))
                / sum(rate(rpc_server_duration_count{rpc_service="oteldemo.ProductReviewService"}[5m]))
              instant: true
              refId: availability
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: availability
              conditions:
                - evaluator: { type: lt, params: [0.995] }
                  operator: { type: and }
                  query: { params: [availability] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          cup: "8"
          cup_name: product_reviews
          team_name: webstore
        annotations:
          summary: "CUP8 Product reviews availability below 99.5%"
          description: >-
            oteldemo.ProductReviewService availability < 99.5%. Review panels
            will fail to load on product detail pages. Does not block purchase.
          runbook: "https://runbooks/cup8-reviews"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

  # ─────────────────────────────────────────────────────────────────────────────
  # Canary Probe Alerts — all CUPs
  # ─────────────────────────────────────────────────────────────────────────────
  - orgId: 1
    name: CUP.CanaryProbes
    folder: CUP SLO
    interval: 1m
    rules:
      - uid: canary-cup1-down
        title: "Canary CUP1 Checkout probe failing (critical)"
        condition: threshold
        data:
          - refId: probe
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: webstore-metrics
            model:
              expr: avg_over_time(probe_success{job="cup1-checkout-payment"}[5m])
              instant: true
              refId: probe
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: probe
              conditions:
                - evaluator: { type: lt, params: [0.8] }
                  operator: { type: and }
                  query: { params: [probe] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        labels:
          severity: critical
          cup: "1"
          cup_name: checkout_payment
          source: canary
          team_name: webstore
        annotations:
          summary: "Canary: CUP1 Checkout probe < 80% success over 5 min"
          description: >-
            The synthetic canary for the checkout workflow is failing. This
            may be an early indicator of a production issue before real-user
            metrics degrade. Investigate immediately.
          runbook: "https://runbooks/canary-cup1"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

      - uid: canary-cup3-down
        title: "Canary CUP3 Cart probe failing (critical)"
        condition: threshold
        data:
          - refId: probe
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: webstore-metrics
            model:
              expr: avg_over_time(probe_success{job="cup3-cart-management"}[5m])
              instant: true
              refId: probe
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: probe
              conditions:
                - evaluator: { type: lt, params: [0.8] }
                  operator: { type: and }
                  query: { params: [probe] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        labels:
          severity: critical
          cup: "3"
          cup_name: cart_management
          source: canary
          team_name: webstore
        annotations:
          summary: "Canary: CUP3 Cart probe < 80% success over 5 min"
          description: >-
            The synthetic canary for the cart workflow is failing. This
            may indicate Valkey (Redis) or Cart service degradation.
          runbook: "https://runbooks/canary-cup3"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

      - uid: canary-cup6-down
        title: "Canary CUP6 Currency probe failing (warning)"
        condition: threshold
        data:
          - refId: probe
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: webstore-metrics
            model:
              expr: avg_over_time(probe_success{job="cup6-currency"}[5m])
              instant: true
              refId: probe
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: probe
              conditions:
                - evaluator: { type: lt, params: [0.8] }
                  operator: { type: and }
                  query: { params: [probe] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        labels:
          severity: warning
          cup: "6"
          cup_name: currency_display
          source: canary
          team_name: webstore
        annotations:
          summary: "Canary: CUP6 Currency probe < 80% success"
          description: >-
            The currency service canary is failing. Non-USD users will see
