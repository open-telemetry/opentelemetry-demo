                sum(rate(http_server_request_duration_seconds_count{http_route="/getquote",http_response_status_code!~"5.."}[5m]))
                / sum(rate(http_server_request_duration_seconds_count{http_route="/getquote"}[5m]))
              instant: true
              refId: availability
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: availability
              conditions:
