          severity: warning
          cup: "5"
          cup_name: shipping_quote
          team_name: webstore
        annotations:
          summary: "CUP5 Shipping quote availability below 99.9%"
          description: >-
            The quote service /getquote endpoint is returning errors. Checkout
            calls GetQuote synchronously — failures will propagate to CUP 1.
          runbook: "https://runbooks/cup5-shipping-quote"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

      - uid: cup5-latency-p95-warning
        title: "CUP5 Shipping Quote P95 > 600ms (warning)"
        condition: threshold
        data:
          - refId: latency_p95
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: webstore-metrics
            model:
              expr: >-
                histogram_quantile(0.95, sum by (le) (
                  rate(http_server_request_duration_seconds_bucket{http_route="/getquote"}[5m])
                ))
              instant: true
              refId: latency_p95
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: latency_p95
              conditions:
                - evaluator: { type: gt, params: [0.6] }
                  operator: { type: and }
                  query: { params: [latency_p95] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          cup: "5"
          cup_name: shipping_quote
          team_name: webstore
        annotations:
          summary: "CUP5 Shipping quote P95 latency > 600ms"
          description: >-
            GetQuote latency P95 > 600ms for >5 min. This adds directly to
            checkout latency (CUP1 P95 SLO of 3s).
          runbook: "https://runbooks/cup5-quote-latency"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

  # ─────────────────────────────────────────────────────────────────────────────
