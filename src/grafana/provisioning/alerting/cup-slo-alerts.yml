                ))
              instant: true
              refId: latency_p95
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: latency_p95
              conditions:
                - evaluator: { type: gt, params: [100] }
                  operator: { type: and }
                  query: { params: [latency_p95] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          cup: "6"
          cup_name: currency_display
          team_name: webstore
        annotations:
          summary: "CUP6 Currency Convert P95 > 100ms"
          description: >-
            CurrencyService/Convert P95 latency > 100ms. Called on every page
            load; slow currency adds directly to browse and checkout latency.
          runbook: "https://runbooks/cup6-currency-latency"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

