    folder: CUP SLO
    interval: 1m
    rules:
      - uid: cup2-avail-warning
        title: "CUP2 Browse Availability < 99.9% (warning)"
        condition: threshold
        data:
          - refId: availability
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: webstore-metrics
            model:
              expr: >-
                sum(rate(http_server_request_duration_seconds_count{http_route=~"/api/products.*",http_response_status_code!~"5.."}[5m]))
                / sum(rate(http_server_request_duration_seconds_count{http_route=~"/api/products.*"}[5m]))
              instant: true
              refId: availability
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: availability
              conditions:
                - evaluator: { type: lt, params: [0.999] }
                  operator: { type: and }
                  query: { params: [availability] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 3m
        labels:
          severity: warning
          cup: "2"
          cup_name: browse_discovery
          team_name: webstore
        annotations:
          summary: "CUP2 Product browse availability below 99.9%"
          description: >-
            The product listing endpoints availability has dropped below 99.9%
            for >3 minutes. Broken browse prevents all conversions.
          runbook: "https://runbooks/cup2-browse"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

      - uid: cup2-latency-p95-warning
        title: "CUP2 Browse P95 Latency > 800ms (warning)"
        condition: threshold
        data:
          - refId: latency_p95
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: webstore-metrics
            model:
              expr: >-
                histogram_quantile(0.95, sum by (le) (
                  rate(http_server_request_duration_seconds_bucket{http_route=~"/api/products.*",http_request_method="GET"}[5m])
                ))
              instant: true
              refId: latency_p95
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: latency_p95
              conditions:
                - evaluator: { type: gt, params: [0.8] }
                  operator: { type: and }
                  query: { params: [latency_p95] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          cup: "2"
          cup_name: browse_discovery
          team_name: webstore
        annotations:
          summary: "CUP2 Browse P95 latency exceeds 800ms"
          description: >-
            P95 latency for GET /api/products* has exceeded 800ms for >5 min.
            Current: {{ $values.latency_p95.Value | humanizeDuration }}.
          runbook: "https://runbooks/cup2-browse-latency"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

