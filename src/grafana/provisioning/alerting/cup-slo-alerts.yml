# CUP SLO Alert Rules — Astronomy Shop
# Covers all 8 Critical User Paths defined in doc/CRITICAL_USER_PATHS_ANALYSIS.md
# Severity: critical = page immediately | warning = ticket / Slack
# All rules evaluate on a 1-minute interval.

---
apiVersion: 1
groups:
  # ─────────────────────────────────────────────────────────────────────────────
  # CUP 1 — Checkout & Payment (Priority P0 — 99.95% availability, P95 < 3,000 ms)
  # ─────────────────────────────────────────────────────────────────────────────
  - orgId: 1
    name: CUP1.CheckoutPayment
    folder: CUP SLO
    interval: 1m
    rules:
      - uid: cup1-avail-critical
        title: "CUP1 Checkout Availability < 99.95% (critical)"
        condition: threshold
        data:
          - refId: availability
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: webstore-metrics
            model:
              expr: >-
                sum(rate(http_server_request_duration_seconds_count{http_route="/api/checkout",http_response_status_code!~"5.."}[5m]))
                / sum(rate(http_server_request_duration_seconds_count{http_route="/api/checkout"}[5m]))
              instant: true
              refId: availability
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: availability
              conditions:
                - evaluator: { type: lt, params: [0.9995] }
                  operator: { type: and }
                  query: { params: [availability] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 2m
        keepFiringFor: 5m
        labels:
          severity: critical
          cup: "1"
          cup_name: checkout_payment
          team_name: webstore
        annotations:
          summary: "CUP1 Checkout availability below 99.95% SLO"
          description: >-
            The checkout endpoint /api/checkout availability has dropped below
            99.95% for >2 minutes. This is a direct revenue-impacting event.
            Current value: {{ $values.availability.Value | humanizePercentage }}.
          runbook: "https://runbooks/cup1-checkout-availability"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

      - uid: cup1-latency-p95-warning
        title: "CUP1 Checkout P95 Latency > 3s (warning)"
        condition: threshold
        data:
          - refId: latency_p95
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: webstore-metrics
            model:
              expr: >-
                histogram_quantile(0.95, sum by (le) (
                  rate(http_server_request_duration_seconds_bucket{
                    http_route="/api/checkout",
                    http_request_method="POST"
                  }[5m])
                ))
              instant: true
              refId: latency_p95
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: latency_p95
              conditions:
                - evaluator: { type: gt, params: [3.0] }
                  operator: { type: and }
                  query: { params: [latency_p95] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        keepFiringFor: 5m
        labels:
          severity: warning
          cup: "1"
          cup_name: checkout_payment
          team_name: webstore
        annotations:
          summary: "CUP1 Checkout P95 latency exceeds 3s SLO"
          description: >-
            The P95 latency for POST /api/checkout has been above 3,000 ms for
            >5 minutes. Current value: {{ $values.latency_p95.Value | humanizeDuration }}.
          runbook: "https://runbooks/cup1-checkout-latency"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

      - uid: cup1-error-budget-warning
        title: "CUP1 Checkout Error Budget Burn Rate > 5× (warning)"
        condition: threshold
        data:
          - refId: burn_rate
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: webstore-metrics
            model:
              expr: >-
                (
                  sum(rate(http_server_request_duration_seconds_count{http_route="/api/checkout",http_response_status_code=~"5.."}[1h]))
                  / sum(rate(http_server_request_duration_seconds_count{http_route="/api/checkout"}[1h]))
                ) / 0.0005
              instant: true
              refId: burn_rate
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: burn_rate
              conditions:
                - evaluator: { type: gt, params: [5.0] }
                  operator: { type: and }
                  query: { params: [burn_rate] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          cup: "1"
          cup_name: checkout_payment
          team_name: webstore
        annotations:
          summary: "CUP1 Checkout error budget burning >5× nominal rate"
          description: >-
            The error budget for the checkout SLO is burning at more than 5×
            the nominal rate over the last 1 hour. At this rate the monthly
            budget will be exhausted in < 6 days.
          runbook: "https://runbooks/cup1-error-budget"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

  # ─────────────────────────────────────────────────────────────────────────────
  # CUP 2 — Product Browse & Discovery (Priority P1 — 99.9%, P95 < 800 ms)
