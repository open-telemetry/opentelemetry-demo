                  rate(http_server_request_duration_seconds_bucket{http_route="/api/cart"}[5m])
                ))
              instant: true
              refId: latency_p95
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: latency_p95
              conditions:
                - evaluator: { type: gt, params: [0.3] }
                  operator: { type: and }
                  query: { params: [latency_p95] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          cup: "3"
          cup_name: cart_management
          team_name: webstore
        annotations:
          summary: "CUP3 Cart P95 latency > 300ms"
          description: >-
            Cart gRPC P95 latency has exceeded 300ms for >5 min.
            Valkey (Redis) may be under load or network degraded.
          runbook: "https://runbooks/cup3-cart-latency"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

  # ─────────────────────────────────────────────────────────────────────────────
  # CUP 4 — Order Fulfillment / Async Post-Purchase (Priority P1)
  # ─────────────────────────────────────────────────────────────────────────────
  - orgId: 1
    name: CUP4.OrderFulfillment
    folder: CUP SLO
    interval: 1m
    rules:
      - uid: cup4-kafka-lag-warning
        title: "CUP4 Accounting Kafka Consumer Lag > 1,000 (warning)"
        condition: threshold
        data:
          - refId: lag
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: webstore-metrics
            model:
              expr: >-
                kafka_consumer_group_lag{group="accounting-service",topic="orders"}
              instant: true
              refId: lag
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: lag
              conditions:
                - evaluator: { type: gt, params: [1000] }
                  operator: { type: and }
                  query: { params: [lag] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          cup: "4"
          cup_name: order_fulfillment
          team_name: webstore
        annotations:
          summary: "CUP4 Accounting consumer lag > 1,000 messages"
          description: >-
            The accounting-service Kafka consumer lag on topic 'orders' has
            exceeded 1,000 messages for >5 minutes. Order accounting will be delayed.
          runbook: "https://runbooks/cup4-kafka-lag"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

      - uid: cup4-shiporder-avail-warning
        title: "CUP4 ShipOrder gRPC Availability < 99.9% (warning)"
        condition: threshold
        data:
          - refId: availability
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: webstore-metrics
            model:
              expr: >-
                sum(rate(rpc_server_duration_count{rpc_service="hipstershop.ShippingService",rpc_method="ShipOrder",rpc_grpc_status_code="0"}[5m]))
                / sum(rate(rpc_server_duration_count{rpc_service="hipstershop.ShippingService",rpc_method="ShipOrder"}[5m]))
              instant: true
              refId: availability
          - refId: threshold
            datasourceUid: __expr__
            model:
              refId: threshold
              type: threshold
              expression: availability
              conditions:
                - evaluator: { type: lt, params: [0.999] }
                  operator: { type: and }
                  query: { params: [availability] }
                  reducer: { type: last, params: [] }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 3m
        labels:
          severity: warning
          cup: "4"
          cup_name: order_fulfillment
          team_name: webstore
        annotations:
          summary: "CUP4 ShipOrder availability below 99.9%"
          description: >-
            hipstershop.ShippingService/ShipOrder availability has dropped
            below 99.9%. Shipping confirmation emails will not be sent.
          runbook: "https://runbooks/cup4-shiporder"
        isPaused: false
        notification_settings:
          receiver: grafana-default-email

  # ─────────────────────────────────────────────────────────────────────────────
  # CUP 5 — Shipping Quote (Priority P1 — 99.9%, P95 < 600 ms)
