# ─────────────────────────────────────────────────────────────────────────────
# Grafana Synthetic Monitoring — CUP Canary Checks
# Native Grafana provisioning file (apiVersion: 1)
#
# Loaded automatically by Grafana at startup when placed under:
#   provisioning/synthetic-monitoring/
#
# One HTTP heartbeat check per Critical User Path (CUP 1–8).
# Frequency, timeout and probe locations can be overridden via environment
# variables using Grafana's env-var interpolation: ${VAR_NAME}
#
# Default probe locations: Sydney, Frankfurt, Chicago
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

checks:

  # ───────────────────────────────────────────────────────────────────────────
  # CUP 1 — Checkout & Payment
  # SLO: 99.95% availability | P95 < 3,000 ms
  # ───────────────────────────────────────────────────────────────────────────
  - job: cup1-checkout-payment
    target: "${FRONTEND_URL:-http://frontend-proxy:8080}/api/checkout"
    frequency: 60000   # ms — every 60 s
    timeout: 10000     # ms — 10 s hard timeout
    enabled: true
    probes:
      - Sydney
      - Frankfurt
      - Chicago

    settings:
      http:
        ipVersion: V4
        method: POST
        headers:
          - name: Content-Type
            value: application/json
        body: >
          {
            "userId": "canary-cup1-hb",
            "userCurrency": "USD",
            "address": {
              "streetAddress": "1600 Amphitheatre Parkway",
              "city": "Mountain View",
              "state": "CA",
              "country": "USA",
              "zipCode": "94043"
            },
            "email": "canary@astronomy.shop",
            "creditCard": {
              "creditCardNumber": "4432-8015-6152-0454",
              "creditCardCvv": 672,
              "creditCardExpirationYear": 2030,
              "creditCardExpirationMonth": 1
            }
          }
        validStatusCodes:
          - 200
          - 201
        failIfStatusCodeNotIn:
          - 200
          - 201
        noFollowRedirects: false

    labels:
      cup: "1"
      cup_name: checkout_payment
      cup_priority: P0
      environment: production

  # ───────────────────────────────────────────────────────────────────────────
  # CUP 2 — Product Browse & Discovery
  # SLO: 99.9% availability | P95 < 800 ms
  # ───────────────────────────────────────────────────────────────────────────
  - job: cup2-browse-discovery
    target: "${FRONTEND_URL:-http://frontend-proxy:8080}/api/products"
    frequency: 60000
    timeout: 5000
    enabled: true
    probes:
      - Sydney
      - Frankfurt
      - Chicago

    settings:
      http:
        ipVersion: V4
        method: GET
        validStatusCodes:
          - 200
        failIfBodyNotMatchesRegexp:
          - '"id"'   # response must contain at least one product id field
        noFollowRedirects: false

    labels:
      cup: "2"
      cup_name: browse_discovery
      cup_priority: P1
      environment: production

  # ───────────────────────────────────────────────────────────────────────────
  # CUP 3 — Shopping Cart Management
  # SLO: 99.95% availability | P95 < 300 ms
  # ───────────────────────────────────────────────────────────────────────────
  - job: cup3-cart-management
    target: "${FRONTEND_URL:-http://frontend-proxy:8080}/api/cart"
    frequency: 60000
    timeout: 5000
    enabled: true
    probes:
      - Sydney
      - Frankfurt
      - Chicago

    settings:
      http:
        ipVersion: V4
        method: POST
        headers:
          - name: Content-Type
            value: application/json
        body: >
          {
            "userId": "canary-cup3-hb",
            "item": { "productId": "OLJCESPC7Z", "quantity": 1 }
          }
        validStatusCodes:
          - 200
          - 201
        noFollowRedirects: false

    labels:
      cup: "3"
      cup_name: cart_management
      cup_priority: P0
      environment: production

  # ───────────────────────────────────────────────────────────────────────────
  # CUP 4 — Order Fulfillment (async pipeline)
  # SLO: 99.9% availability; Kafka lag < 1,000
  # Runs at 2× the base interval — heavier end-to-end probe
  # ───────────────────────────────────────────────────────────────────────────
  - job: cup4-order-fulfillment
    target: "${FRONTEND_URL:-http://frontend-proxy:8080}/api/checkout"
    frequency: 120000  # every 120 s (heavier / more expensive)
    timeout: 15000
    enabled: true
    probes:
      - Sydney
      - Frankfurt
      - Chicago

    settings:
      http:
        ipVersion: V4
        method: POST
        headers:
          - name: Content-Type
            value: application/json
        body: >
          {
            "userId": "canary-cup4-hb",
            "userCurrency": "USD",
            "address": {
              "streetAddress": "1 Infinite Loop",
              "city": "Cupertino",
              "state": "CA",
              "country": "USA",
              "zipCode": "95014"
            },
            "email": "canary-cup4@astronomy.shop",
            "creditCard": {
              "creditCardNumber": "4432-8015-6152-0454",
              "creditCardCvv": 672,
              "creditCardExpirationYear": 2030,
              "creditCardExpirationMonth": 1
            }
          }
        validStatusCodes:
          - 200
          - 201
        noFollowRedirects: false

    labels:
      cup: "4"
      cup_name: order_fulfillment
      cup_priority: P0
      environment: production

  # ───────────────────────────────────────────────────────────────────────────
  # CUP 5 — Shipping Quote
  # SLO: 99.9% availability | P95 < 600 ms
  # ───────────────────────────────────────────────────────────────────────────
  - job: cup5-shipping-quote
    target: "${FRONTEND_URL:-http://frontend-proxy:8080}/getquote"
    frequency: 60000
    timeout: 5000
    enabled: true
    probes:
      - Sydney
      - Frankfurt
      - Chicago

    settings:
      http:
        ipVersion: V4
        method: POST
        headers:
          - name: Content-Type
            value: application/json
        body: >
          {
            "address": {
              "streetAddress": "1600 Amphitheatre Parkway",
              "city": "Mountain View",
              "state": "CA",
              "country": "USA",
              "zipCode": "94043"
            },
            "items": [{ "productId": "OLJCESPC7Z", "quantity": 1 }]
          }
        validStatusCodes:
          - 200
        failIfBodyNotMatchesRegexp:
          - '"costUsd"'   # response must contain a shipping cost
        noFollowRedirects: false

    labels:
      cup: "5"
      cup_name: shipping_quote
      cup_priority: P1
      environment: production

  # ───────────────────────────────────────────────────────────────────────────
  # CUP 6 — Currency Selection & Price Display
  # SLO: 99.95% availability | P95 < 100 ms
  # ───────────────────────────────────────────────────────────────────────────
  - job: cup6-currency
    target: "${FRONTEND_URL:-http://frontend-proxy:8080}/api/currencies"
    frequency: 60000
    timeout: 3000
    enabled: true
    probes:
      - Sydney
      - Frankfurt
      - Chicago

    settings:
      http:
        ipVersion: V4
        method: GET
        validStatusCodes:
          - 200
        failIfBodyNotMatchesRegexp:
          - 'USD'   # USD must always be present
        noFollowRedirects: false

    labels:
      cup: "6"
      cup_name: currency_display
      cup_priority: P1
      environment: production

  # ───────────────────────────────────────────────────────────────────────────
  # CUP 7 — AI Product Assistant
  # SLO: 99.0% availability | P95 < 10,000 ms
  # Runs every 300 s to limit LLM API cost
  # ───────────────────────────────────────────────────────────────────────────
  - job: cup7-ai-assistant
    target: "${FRONTEND_URL:-http://frontend-proxy:8080}/v1/chat/completions"
    frequency: 300000  # every 5 min — LLM calls are expensive
    timeout: 30000
    enabled: true
    probes:
      - Sydney
      - Frankfurt

    settings:
      http:
        ipVersion: V4
        method: POST
        headers:
          - name: Content-Type
            value: application/json
        body: >
          {
            "model": "gpt-3.5-turbo",
            "messages": [{ "role": "user", "content": "ping" }],
            "max_tokens": 5,
            "temperature": 0.0
          }
        validStatusCodes:
          - 200
        failIfBodyNotMatchesRegexp:
          - '"choices"'   # response must contain OpenAI-compatible choices
        noFollowRedirects: false

    labels:
      cup: "7"
      cup_name: ai_assistant
      cup_priority: P2
      environment: production

  # ───────────────────────────────────────────────────────────────────────────
  # CUP 8 — Product Reviews
  # SLO: 99.5% availability | P95 < 500 ms
  # ───────────────────────────────────────────────────────────────────────────
  - job: cup8-product-reviews
    target: "${FRONTEND_URL:-http://frontend-proxy:8080}/api/reviews/OLJCESPC7Z"
    frequency: 60000
    timeout: 5000
    enabled: true
    probes:
      - Sydney
      - Frankfurt
      - Chicago

    settings:
      http:
        ipVersion: V4
        method: GET
        validStatusCodes:
          - 200
        failIfBodyNotMatchesRegexp:
          - '"reviews"'   # response must contain reviews array
        noFollowRedirects: false

    labels:
      cup: "8"
      cup_name: product_reviews
      cup_priority: P2
      environment: production