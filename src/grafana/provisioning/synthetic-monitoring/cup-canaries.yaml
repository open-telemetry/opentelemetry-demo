# CUP Synthetic Monitoring — Blackbox Exporter Implementation
#
# NOTE: Grafana Cloud Synthetic Monitoring plugin is cloud-only.
# This stack uses Prometheus Blackbox Exporter for equivalent local probes.
#
# Probe definitions live in: src/blackbox/blackbox.yml
# Prometheus scrape jobs live in: src/prometheus/prometheus-config.yaml
#
# Metrics available in Grafana (Prometheus datasource):
#   probe_success{job="cup1-checkout-payment"}        — 1=up, 0=down
#   probe_duration_seconds{job="cup2-browse-discovery"} — latency
#   probe_http_status_code{job="cup3-cart-management"}  — HTTP status
#
# Dashboard: src/grafana/provisioning/dashboards/slo/cup-canary-probes.json
#
# ── CUP → Blackbox probe mapping ──────────────────────────────────────────────
#
# CUP 1  Checkout & Payment  P0  job=cup1-checkout-payment  60s
# CUP 2  Browse & Discovery  P1  job=cup2-browse-discovery  60s
# CUP 3  Cart Management     P0  job=cup3-cart-management   60s
# CUP 4  Order Fulfillment   P0  job=cup4-order-fulfillment 120s
# CUP 5  Shipping Quote      P1  job=cup5-shipping-quote    60s
# CUP 6  Currency Display    P1  job=cup6-currency          60s
# CUP 7  AI Assistant        P2  job=cup7-ai-assistant      300s
# CUP 8  Product Reviews     P2  job=cup8-product-reviews   60s