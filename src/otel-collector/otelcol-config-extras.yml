# extra settings to be merged into OpenTelemetry Collector configuration
# do not delete this file

## Example configuration for sending data to your own OTLP HTTP backend
## Note: the spanmetrics exporter must be included in the exporters array
## if overriding the traces pipeline.
##
exporters:
  otlp_http/okapi_prometheus:
    endpoint: ${env:OKAPI_OTLP_HTTP_ENDPOINT}
    encoding: proto
    compression: none
    tls:
      insecure: true

  otlp_http/okapi:
    endpoint: ${env:OKAPI_OTLP_HTTP_ENDPOINT}
    encoding: proto
    compression: none
    tls:
      insecure: true

service:
  pipelines:
    traces:
      exporters: [debug, spanmetrics, otlp_http/okapi]
    metrics:
      exporters: [otlp_http/prometheus, debug, otlp_http/okapi_prometheus]
    logs:
      exporters: [debug, otlp_http/okapi]
