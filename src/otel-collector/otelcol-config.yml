# Base collector configuration: receivers, processors, and pipelines.
# Exports only to the debug exporter by default.
# Layer additional configs on top with --config to add exporters:
#   otelcol-config-full.yml        adds Kafka and PostgreSQL metric receivers
#   otelcol-config-observability.yml  adds Jaeger, Prometheus, OpenSearch exporters
#   otelcol-config-extras.yml      extras/customizations (empty stub)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: ${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_GRPC}
      http:
        endpoint: ${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"
  httpcheck/frontend-proxy:
    targets:
      - endpoint: http://${env:FRONTEND_PROXY_ADDR}
  nginx:
    endpoint: http://${env:IMAGE_PROVIDER_HOST}:${env:IMAGE_PROVIDER_PORT}/status
    collection_interval: 10s
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    # https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/44511
    api_version: "1.44"
  redis:
    endpoint: "valkey-cart:6379"
    username: "valkey"
    collection_interval: 10s
  # Host metrics
  hostmetrics:
    root_path: /hostfs
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
          system.cpu.logical.count:
            enabled: true
      disk:
      load:
      filesystem:
        exclude_mount_points:
          mount_points:
            - /dev/*
            - /proc/*
            - /sys/*
            - /run/k3s/containerd/*
            - /var/lib/docker/*
            - /var/lib/kubelet/*
            - /snap/*
          match_type: regexp
        exclude_fs_types:
          fs_types:
            - autofs
            - binfmt_misc
            - bpf
            - cgroup2
            - configfs
            - debugfs
            - devpts
            - devtmpfs
            - fusectl
            - hugetlbfs
            - iso9660
            - mqueue
            - nsfs
            - overlay
            - proc
            - procfs
            - pstore
            - rpc_pipefs
            - securityfs
            - selinuxfs
            - squashfs
            - sysfs
            - tracefs
          match_type: strict
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
          system.memory.limit:
            enabled: true
      network:
      paging:
        metrics:
          system.paging.usage:
            enabled: true
      processes:
      process:
        mute_process_exe_error: true
        mute_process_io_error: true
        mute_process_user_error: true
      system:
        metrics:
          system.uptime:
            enabled: true

exporters:
  debug:

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
  resourcedetection:
    detectors: [env, docker, system]
  transform/sanitize_logs:
    error_mode: ignore
    log_statements:
      - context: scope
        statements:
          # Rename flat "otelcol.signal" scope attribute to prevent mapping
          # conflict with the dotted "otelcol.signal.output" attribute.
          # Upstream Issue: https://github.com/open-telemetry/opentelemetry-collector/issues/15221
          - set(attributes["otelcol_signal"], attributes["otelcol.signal"]) where attributes["otelcol.signal"] != nil and not IsMap(attributes["otelcol.signal"])
          - delete_key(attributes, "otelcol.signal") where attributes["otelcol_signal"] != nil
  transform/sanitize_spans:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          # Sanitize spans to prevent span metrics cardinality explosion
          # caused by non-compliant high cardinality span names:
          # 1. Define missing http.route on key HTTP operations for meaningful operation names
          # 2. Then normalize span names; http server spans lacking http.route default to operations "GET", "POST", etc.

          # FRONTEND SERVICE

          # Workaround for Next.js high cardinality span name issue: https://github.com/vercel/next.js/issues/54694
          - set(span.attributes["http.route"], "/api/cart") where
            span.kind == SPAN_KIND_SERVER and
            resource.attributes["service.name"] == "frontend" and
            span.attributes["http.route"] == nil and
            IsMatch(span.attributes["http.target"], "\\/api\\/cart")  # e.g. # /api/cart

          - set(span.attributes["http.route"], "/api/checkout") where
            span.kind == SPAN_KIND_SERVER and
            resource.attributes["service.name"] == "frontend" and
            span.attributes["http.route"] == nil and
            IsMatch(span.attributes["http.target"], "\\/api\\/checkout")  # e.g. # /api/checkout

          - set(span.attributes["http.route"], "/api/products/{productId}") where
            span.kind == SPAN_KIND_SERVER and
            resource.attributes["service.name"] == "frontend" and
            span.attributes["http.route"] == nil and
            IsMatch(span.attributes["http.target"], "\\/api\\/products\\/.*")  # e.g. /api/products/1YMWWN1N4O

          - set(span.attributes["http.route"], "/api/recommendations") where
            span.kind == SPAN_KIND_SERVER and
            resource.attributes["service.name"] == "frontend" and
            span.attributes["http.route"] == nil and
            IsMatch(span.attributes["http.target"], "\\/api\\/recommendations")  # e.g. # /api/recommendations?productIds=...

          - set(span.attributes["http.route"], "/api/data") where
            span.kind == SPAN_KIND_SERVER and
            resource.attributes["service.name"] == "frontend" and
            span.attributes["http.route"] == nil and
            IsMatch(span.attributes["http.target"], "\\/api\\/data.*")  # e.g. # " /api/data?contextKeys=telescopes" or /api/data/?contextKeys=cameras

          # SANITIZE ALL SPAN NAMES TO PREVENT CARDINALITY EXPLOSION
          - set_semconv_span_name("1.37.0", "original_span_name")

connectors:
  spanmetrics:

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, transform/sanitize_spans]
      exporters: [debug, spanmetrics]
    metrics:
      receivers: [docker_stats, httpcheck/frontend-proxy, hostmetrics, nginx, otlp, redis, spanmetrics]
      processors: [memory_limiter, resourcedetection]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, memory_limiter, transform/sanitize_logs]
      exporters: [opensearch, debug]
  telemetry:
    metrics:
      readers:
        - periodic:
            exporter:
              otlp:
                protocol: http/protobuf
                # replace with your observability meta monitoring backend
                endpoint: http://${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
    logs:
      processors:
        - batch:
            exporter:
              otlp:
                protocol: http/protobuf
                # replace with your observability meta monitoring backend
                endpoint: http://${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
