global:
  # Align Prometheus scrape interval with the OTel SDKs' export interval for consistency (see OTEL_METRIC_EXPORT_INTERVAL)
  scrape_interval: 60s

otlp:
  keep_identifying_resource_attributes: true
  promote_resource_attributes:
    - service.instance.id
    - service.name
    - service.namespace
    - service.version
    - cloud.availability_zone
    - cloud.region
    - deployment.environment.name

    # When deploying on Kubernetes, resource attributes used to identify the
    # kubernetes resources in dashboards and alerts.
    - k8s.cluster.name
    - k8s.container.name
    - k8s.cronjob.name
    - k8s.daemonset.name
    - k8s.deployment.name
    - k8s.job.name
    - k8s.namespace.name
    - k8s.node.name
    - k8s.pod.name
    - k8s.replicaset.name
    - k8s.statefulset.name
    - container.name

    # When deploying on VMs, resource attributes used to identify
    # the host in dashboards and alerts.
    - host.name

    # PostgreSQL resource attributes produced by the OTel Collector PostgreSQL receiver
    # and used in dashboards and alerts.
    # See https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/receiver/postgresqlreceiver/metadata.yaml
    - postgresql.database.name
    - postgresql.schema.name
    - postgresql.table.name
    - postgresql.index.name

    # Kafka resource attributes produced by the OTel Collector Kafka receiver
    # https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/kafkametricsreceiver
    - kafka.cluster.alias

    # See https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/v0.142.0/connector/spanmetricsconnector/README.md#known-limitation-the-single-writer-principle
    - collector.instance.id
storage:
  tsdb:
    out_of_order_time_window: 30m

# ── CUP Synthetic Probes via Blackbox Exporter ────────────────────────────────
scrape_configs:

  # CUP 1 — Checkout & Payment (P0)
  - job_name: cup1-checkout-payment
    scrape_interval: 60s
    metrics_path: /probe
    params:
      module: [http_post_checkout_probe]
    static_configs:
      - targets:
          - http://frontend-proxy:8080/api/checkout
        labels:
          cup: "1"
          cup_name: "Checkout & Payment"
          cup_priority: "P0"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: target
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # CUP 2 — Product Browse & Discovery (P1)
  - job_name: cup2-browse-discovery
    scrape_interval: 60s
    metrics_path: /probe
