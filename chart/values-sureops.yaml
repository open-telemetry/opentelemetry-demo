# Sureops-flavored OTel Demo overrides.
#
# Applied via Helm value-file precedence at deploy time:
#   values.yaml < values-sureops.yaml < values-customer.yaml
#
# This file is checked into the template fork and inherited by every
# customer fork. Do NOT put per-customer values here — those go in
# values-customer.yaml which coord stamps at fork time.
#
# Reference: docs/backend/22-sample-stack-otel-demo-spec.md (sureops repo)

# ===========================================================================
# Customer attribution (default values; overridden in values-customer.yaml)
# ===========================================================================
customer:
  slug: ""
  orgId: ""
env: uat

# ===========================================================================
# Bundled observability subcharts: DISABLED.
# Sureops provides multi-tenant Tempo, Prometheus, Grafana, and Loki.
# (Also set in values.yaml; doubly-set here so an upstream-sync that
# resets values.yaml doesn't accidentally re-enable them.)
# ===========================================================================
jaeger:        { enabled: false }
prometheus:    { enabled: false }
grafana:       { enabled: false }
opensearch:    { enabled: false }

# ===========================================================================
# OTel Collector — sends every signal to a sureops-managed backend.
#
# Defaults below assume the sureops shared cluster: collector and
# Tempo/Loki are co-located, so we use in-cluster Service URLs (no
# DNS, no public ingress, no TLS termination needed). Tempo's OTLP
# HTTP receiver listens on :4318; Loki's mounts the OTLP path
# under /otlp. Tenancy uses the X-Scope-OrgID header (per customer
# slug) routed by the receiving backend.
#
# REAL CUSTOMERS OVERRIDE in values-customer.yaml when they:
#   * run their own Tempo / Loki (or Tempo Cloud, Honeycomb, etc.)
#   * run sureops in their cluster (different service DNS)
# Example values-customer.yaml override:
#   opentelemetry-collector:
#     config:
#       exporters:
#         otlphttp/sureops_tempo:
#           endpoint: https://tempo.example-corp.com
#           headers: { Authorization: "Bearer ..." }
# ===========================================================================
opentelemetry-collector:
  # Expose the prometheus exporter on its own named port so the
  # shared kube-prometheus-stack Prometheus operator (via the
  # PodMonitor in deploy/k3s/per-customer/templates/) can scrape
  # ``traces_service_graph_*`` and any other ``prometheus`` exporter
  # output. The OTel collector helm subchart's default ``ports``
  # block only exposes the standard receivers (otlp, jaeger, zipkin)
  # and the collector's own self-metrics on :8888 — it doesn't add
  # a port for arbitrary exporters defined in ``config.exporters``,
  # so we declare it here.
  ports:
    prom-exporter:
      enabled: true
      containerPort: 9464
      servicePort: 9464
      protocol: TCP

  config:
    connectors:
      # OTel servicegraph connector: derives RED metrics + a
      # client→server topology graph from spans, exposed as Prometheus
      # series (traces_service_graph_request_total{client, server, ...}).
      # Sureops's landscape ingestor consumes these to build the call
      # graph without parsing individual traces.
      servicegraph:
        latency_histogram_buckets: [100us, 1ms, 10ms, 100ms, 1s, 5s]
        store:
          ttl: 2s
          max_items: 1000
        cache_loop: 1m
        store_expiration_loop: 2s

    exporters:
      # Traces → sureops Tempo (in-cluster default, override per-customer)
      otlphttp/sureops_tempo:
        endpoint: http://tempo.tempo.svc.cluster.local:4318
        headers:
          X-Scope-OrgID: ${env:CUSTOMER_SLUG}
        tls:
          insecure: true

      # Logs → sureops Loki via OTLP (in-cluster default, override per-customer)
      otlphttp/sureops_loki:
        endpoint: http://loki.loki.svc.cluster.local:3100/otlp
        headers:
          X-Scope-OrgID: ${env:CUSTOMER_SLUG}
        tls:
          insecure: true

      # Metrics: keep prometheus exporter on :9464 — per-customer
      # Prometheus scrapes services directly via their /metrics endpoints,
      # but the collector also exposes its own metrics here for completeness.
      prometheus:
        endpoint: 0.0.0.0:9464
        resource_to_telemetry_conversion:
          enabled: true

      # Drop the demo's default debug + otlp/jaeger + bundled opensearch exporters
      debug: null
      otlp/jaeger: null
      opensearch: null

    processors:
      # Stamp customer.slug + deployment.environment as resource attrs on every signal
      resource/sureops:
        attributes:
          - key: customer.slug
            value: ${env:CUSTOMER_SLUG}
            action: upsert
          - key: deployment.environment
            value: ${env:DEPLOYMENT_ENV}
            action: upsert

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource/sureops, batch]
          # Fan out: persist to Tempo AND feed the servicegraph connector
          # (the connector then emits metrics into the metrics pipeline).
          exporters: [otlphttp/sureops_tempo, servicegraph]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resource/sureops, batch]
          exporters: [otlphttp/sureops_loki]
        metrics:
          # servicegraph appears as both an exporter (above) and a
          # receiver (here): its connector role is to consume traces
          # and emit the derived metrics.
          receivers: [otlp, servicegraph]
          processors: [memory_limiter, resource/sureops, batch]
          exporters: [prometheus]

  # Inject the customer slug + env as collector pod env vars so the
  # ${env:...} substitutions above resolve at runtime
  extraEnvs:
    - name: CUSTOMER_SLUG
      valueFrom:
        configMapKeyRef:
          name: sureops-customer-config
          key: customer.slug
    - name: DEPLOYMENT_ENV
      valueFrom:
        configMapKeyRef:
          name: sureops-customer-config
          key: env

# ===========================================================================
# Resource sizing — tuned for sureops demo cluster (Hetzner CX42/CX52).
# Most demo customers run with low traffic; default resources are conservative.
# ===========================================================================
default:
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 256Mi }

components:
  # flagd is critical (every service queries it) — give it slightly more
  flagd:
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits:   { cpu: 200m, memory: 128Mi }
  # load-generator can spike under loadGeneratorFloodHomepage flag
  load-generator:
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 256Mi }
